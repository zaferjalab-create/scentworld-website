<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Scent World Canada</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#0b0908;color:#f5f0e6;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{width:100%;max-width:400px;padding:3rem;background:#12100e;border:1px solid rgba(201,165,92,.1);margin:1rem}
.login-box h1{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:500;margin-bottom:.5rem;text-align:center}
.login-box .sub{font-size:.75rem;color:#958e85;text-align:center;margin-bottom:2.5rem;font-weight:200}
label{display:block;font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:#c9a55c;margin-bottom:.5rem;font-weight:400}
input{width:100%;padding:.8rem 1rem;background:rgba(255,255,255,.03);border:1px solid rgba(201,165,92,.1);color:#f5f0e6;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:200;outline:none;margin-bottom:1.2rem;transition:border-color .3s}
input:focus{border-color:#c9a55c}
input::placeholder{color:#635d55}
button{width:100%;padding:1rem;background:#c9a55c;border:none;color:#0b0908;font-family:'Outfit',sans-serif;font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:all .3s;margin-top:.5rem}
button:hover{background:#e0ca8e}
button:disabled{opacity:.5;cursor:not-allowed}
.err{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.2);color:#c0392b;padding:.8rem;font-size:.8rem;text-align:center;margin-top:1rem;display:none}
.back{display:block;text-align:center;margin-top:2rem;font-size:.7rem;color:#635d55;text-decoration:none}
.back:hover{color:#c9a55c}
</style>
</head>
<body>
<div class="login-box">
  <h1>Scent World</h1>
  <p class="sub">Admin Panel</p>
  <form id="loginForm">
    <label>Email</label>
    <input type="email" name="email" placeholder="admin@scentworld.ca" required>
    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" required>
    <button type="submit" id="loginBtn">Sign In</button>
    <div class="err" id="errMsg"></div>
  </form>
  <a href="/" class="back">&larr; Back to website</a>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errMsg');
  btn.disabled = true; btn.textContent = 'Signing in...';
  err.style.display = 'none';
  try {
    const fd = new FormData(e.target);
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: fd.get('email'), password: fd.get('password')})
    });
    const data = await res.json();
    if (data.success) { window.location.href = data.redirect; }
    else { err.textContent = data.error || 'Invalid credentials'; err.style.display = 'block'; }
  } catch(e) { err.textContent = 'Connection error'; err.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Sign In';
});
</script>
</body>
</html>
